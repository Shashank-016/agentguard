name: Bug report
description: Report a problem with AgentGuard
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal code or commands that reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AgentGuard version / commit
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - Anthropic SDK wrapper
        - OpenAI SDK wrapper
        - LangGraph callback
        - MCP proxy
        - Audit API / dashboard
        - CLI
        - Other
